<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asociar Tarjeta</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'VT323', monospace;
            background: linear-gradient(135deg, #1a0033 0%, #330066 50%, #1a0033 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animación Matrix */
        .matrix-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .matrix-column {
            position: absolute;
            top: -100%;
            font-size: 20px;
            color: #00ff00;
            animation: matrix-fall linear infinite;
            opacity: 0.3;
        }

        @keyframes matrix-fall {
            to {
                transform: translateY(100vh);
            }
        }

        .container {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #00ff00;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.5);
            z-index: 10;
            position: relative;
            max-width: 500px;
            width: 90%;
        }

        h1 {
            color: #00ff00;
            text-align: center;
            margin-bottom: 30px;
            font-size: 32px;
            text-shadow: 0 0 10px #00ff00;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #00ff00; }
            to { text-shadow: 0 0 20px #00ff00, 0 0 30px #00ff00; }
        }

        .credit-card {
            background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            color: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .credit-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .card-brand {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            font-weight: bold;
        }

        .card-number {
            font-size: 24px;
            letter-spacing: 3px;
            margin: 40px 0;
            min-height: 30px;
        }

        .card-expiry {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            color: #00ff00;
            display: block;
            margin-bottom: 8px;
            font-size: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #00ff00;
            border-radius: 5px;
            color: #00ff00;
            font-family: 'VT323', monospace;
            font-size: 20px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            background: rgba(0, 255, 0, 0.2);
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        .expiry-inputs {
            display: flex;
            gap: 15px;
        }

        .expiry-inputs input {
            flex: 1;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #00ff00 0%, #00cc00 100%);
            border: none;
            border-radius: 5px;
            color: #000;
            font-family: 'VT323', monospace;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            background: linear-gradient(135deg, #00cc00 0%, #00ff00 100%);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.7);
            transform: translateY(-2px);
        }

        button:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
        }

        .processing {
            display: none;
            text-align: center;
            color: #00ff00;
            font-size: 24px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .success {
            display: none;
            text-align: center;
            color: #00ff00;
            font-size: 28px;
            animation: success-glow 0.5s ease-out;
        }

        @keyframes success-glow {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .error {
            color: #ff0000;
            font-size: 18px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="matrix-bg" id="matrixBg"></div>
    
    <div class="container">
        <h1>ASOCIAR TARJETA</h1>
        
        <div class="credit-card">
            <div class="card-brand" id="cardBrand">VISA</div>
            <div class="card-number" id="displayCardNumber">•••• •••• •••• ••••</div>
            <div class="card-expiry">
                VÁLIDA HASTA: <span id="displayExpiry">MM/AA</span>
            </div>
        </div>

        <form id="cardForm">
            <div class="form-group">
                <label for="cardNumber">Número de Tarjeta</label>
                <input type="text" id="cardNumber" name="cardNumber" 
                       autocomplete="cc-number" 
                       maxlength="19" 
                       placeholder="1234 5678 9012 3456">
            </div>

            <div class="form-group">
                <label>Fecha de Vencimiento</label>
                <div class="expiry-inputs">
                    <input type="text" id="expiryMonth" name="expiryMonth" 
                           autocomplete="cc-exp-month" 
                           maxlength="2" 
                           placeholder="MM">
                    <input type="text" id="expiryYear" name="expiryYear" 
                           autocomplete="cc-exp-year" 
                           maxlength="2" 
                           placeholder="AA">
                </div>
            </div>

            <button type="submit" id="submitBtn">ASOCIAR TARJETA</button>
            
            <div class="error" id="errorMessage"></div>
            <div class="processing" id="processing">PROCESANDO...</div>
            <div class="success" id="success">¡TARJETA ASOCIADA CON ÉXITO!</div>
        </form>
    </div>

    <script>
        // Animación Matrix de fondo
        function createMatrixRain() {
            const matrixBg = document.getElementById('matrixBg');
